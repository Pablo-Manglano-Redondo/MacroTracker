name: Professional Portal

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'professional_portal/**'
      - '.github/workflows/professional-portal.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'professional_portal/**'
      - '.github/workflows/professional-portal.yml'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: professional_portal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: professional_portal/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create config file
        run: cp config.example.js config.js

      - name: Verify portal
        run: npm run verify
