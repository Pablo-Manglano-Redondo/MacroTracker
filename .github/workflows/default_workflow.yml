name: Default Workflow

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  flutter-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          channel: 'stable'
          cache: true
          
      - name: Cache Flutter packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-cache-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-cache-

      - name: Install Pub Dependencies
        run: flutter pub get
        
      - name: Build with secrets
        run: flutter pub run build_runner build --delete-conflicting-outputs
        env:
          FDC_API_KEY: ${{ secrets.FDC_API_KEY }}
          SENTRY_DNS: ${{ secrets.SENTRY_DNS }}
          SUPABASE_PROJECT_ANON_KEY: ${{ secrets.SUPABASE_PROJECT_ANON_KEY }}
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}

      - name: Analyze Code
        run: flutter analyze

      - name: Run Tests
        run: flutter test

  portal-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: professional_portal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: professional_portal/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create config file
        run: cp config.example.js config.js

      - name: Verify portal
        run: npm run verify

  supabase-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run Supabase Edge Function Tests
        shell: pwsh
        run: ./supabase/test.functions.ps1
