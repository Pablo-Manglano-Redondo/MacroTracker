plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"

    id 'io.sentry.android.gradle' version '6.9.0'
}

if (file("google-services.json").exists()) {
    apply plugin: "com.google.gms.google-services"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def pubspecFile = rootProject.file('../pubspec.yaml')
if (!pubspecFile.exists()) {
    throw new GradleException("pubspec.yaml not found. Android release versioning requires the Flutter pubspec version.")
}

def pubspecVersionLine = pubspecFile.readLines().find { it.trim().startsWith('version:') }
if (pubspecVersionLine == null) {
    throw new GradleException("pubspec.yaml is missing a version entry.")
}
def pubspecVersion = pubspecVersionLine.split(':', 2)[1].trim()
def pubspecVersionParts = pubspecVersion.split('\\+')
def flutterVersionName = (project.findProperty('flutter.versionName') ?: pubspecVersionParts[0]).toString()
def flutterVersionCode = (project.findProperty('flutter.versionCode') ?: (pubspecVersionParts.length > 1 ? pubspecVersionParts[1] : '1')).toString()

android {
    namespace "com.epsait.macrotracker"
    compileSdkVersion 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }


    defaultConfig {
        applicationId "com.epsait.macrotracker"
        minSdkVersion 26
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

// Built-in Kotlin should pick this up from the DSL above, but some task graphs
// still retain the legacy 1.8 default unless the compile tasks are aligned too.
tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinJvmCompile).configureEach {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation "androidx.health.connect:connect-client:1.2.0-alpha02"
}


sentry {
    org = "epsait"
    projectName = "macroplanner"

    includeSourceContext = true
    autoUpload = true
    autoUploadProguardMapping = true
}

// Copy sentry.properties from Flutter root directory (shared with iOS) at configuration time
def rootSentryFile = rootProject.file("../sentry.properties")
def localSentryFile = project.file("sentry.properties")
if (rootSentryFile.exists()) {
    localSentryFile.text = rootSentryFile.text
}
