plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def pubspecFile = rootProject.file('../pubspec.yaml')
if (!pubspecFile.exists()) {
    throw new GradleException("pubspec.yaml not found. Android release versioning requires the Flutter pubspec version.")
}

def pubspecVersionLine = pubspecFile.readLines().find { it.trim().startsWith('version:') }
if (pubspecVersionLine == null) {
    throw new GradleException("pubspec.yaml is missing a version entry.")
}
def pubspecVersion = pubspecVersionLine.split(':', 2)[1].trim()
def pubspecVersionParts = pubspecVersion.split('\\+')
def flutterVersionName = (project.findProperty('flutter.versionName') ?: pubspecVersionParts[0]).toString()
def flutterVersionCode = (project.findProperty('flutter.versionCode') ?: (pubspecVersionParts.length > 1 ? pubspecVersionParts[1] : '1')).toString()

android {
    namespace "com.epsait.macrotracker"
    compileSdkVersion 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.epsait.macrotracker"
        minSdkVersion 26
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation "androidx.health.connect:connect-client:1.2.0-alpha02"
}
